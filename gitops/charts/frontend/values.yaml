# Default values for frontend.
# Override with: helm install frontend ./gitops/charts/frontend -f my-values.yaml

replicaCount: 1

image:
  repository: ghcr.io/skyshineth/shipyard-frontend
  pullPolicy: IfNotPresent
  # Overwritten by GitHub Actions CI on each push
  tag: "sha-5b73347"

imagePullSecrets: []

serviceAccount:
  create: true
  name: ""

automountServiceAccountToken: false

# Official nginx image runs as root; avoid runAsNonRoot so the master process can bind and manage workers.
podSecurityContext: {}

containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false
  capabilities:
    drop:
      - ALL
    # After drop ALL, official nginx image still: bind :80, chown cache, setuid/setgid workers (uid 101).
    add:
      - NET_BIND_SERVICE
      - CHOWN
      - SETUID
      - SETGID

service:
  type: ClusterIP
  port: 80
  httpsPort: 443

# Optional TLS for the frontend origin. This is useful behind Cloudflare
# Full (strict): create a Kubernetes TLS secret from a Cloudflare Origin
# Certificate, then enable this and expose service.httpsPort.
originTls:
  enabled: false
  secretName: ""
  mountPath: /etc/nginx/tls

ingress:
  enabled: false
  className: ""
  annotations: {}
  host: shipyard.local
  path: /
  pathType: Prefix
  tls:
    enabled: false
    secretName: ""

resources:
  requests:
    cpu: "25m"
    memory: "48Mi"
  limits:
    cpu: "100m"
    memory: "96Mi"

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 80

# Kubernetes Service names (same namespace) for nginx proxy_pass.
# Must match Helm release / Service names (Argo CD defaults release name to Application name).
upstream:
  auth:
    host: shipyard-auth-service
    port: 8081
  todo:
    host: shipyard-todo-service
    port: 8080
  platform:
    host: shipyard-platform-status
    port: 8082

namespace: shipyard
