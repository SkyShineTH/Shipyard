# Default values for frontend.
# Override with: helm install frontend ./gitops/charts/frontend -f my-values.yaml

replicaCount: 1

image:
  repository: ghcr.io/skyshineth/shipyard-frontend
  pullPolicy: IfNotPresent
  # Overwritten by GitHub Actions CI on each push
  tag: "sha-78aed8a"

imagePullSecrets: []

serviceAccount:
  create: true
  name: ""

automountServiceAccountToken: false

# Official nginx image runs as root; avoid runAsNonRoot so the master process can bind and manage workers.
podSecurityContext: {}

containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false
  capabilities:
    drop:
      - ALL
    # Required so nginx can bind to port 80 after drop ALL (otherwise CrashLoop on many clusters).
    add:
      - NET_BIND_SERVICE

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: false
  className: ""
  annotations: {}
  host: shipyard.local
  path: /
  pathType: Prefix
  tls:
    enabled: false
    secretName: ""

resources:
  requests:
    cpu: "25m"
    memory: "48Mi"
  limits:
    cpu: "100m"
    memory: "96Mi"

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 80

# Kubernetes Service names (same namespace) for nginx proxy_pass.
# Must match Helm release / Service names (Argo CD defaults release name to Application name).
upstream:
  auth:
    host: shipyard-auth-service
    port: 8081
  todo:
    host: shipyard-todo-service
    port: 8080

namespace: shipyard
