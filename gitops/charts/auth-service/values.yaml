# Default values for auth-service.

replicaCount: 1

image:
  repository: ghcr.io/skyshineth/shipyard-auth-service
  pullPolicy: IfNotPresent
  # Overwritten by GitHub Actions CI on each push
  tag: "latest"

service:
  type: ClusterIP
  port: 8081

ingress:
  enabled: false
  className: ""
  annotations: {}
  host: auth.shipyard.local
  path: /
  pathType: Prefix

resources:
  requests:
    cpu: "50m"
    memory: "64Mi"
  limits:
    cpu: "200m"
    memory: "128Mi"

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 80

# Database + JWT secret — create before deploying:
#   kubectl create secret generic auth-service-secret -n shipyard \
#     --from-literal=DB_HOST=postgres \
#     --from-literal=DB_USER=shipyard \
#     --from-literal=DB_PASSWORD=<your-password> \
#     --from-literal=DB_NAME=shipyard \
#     --from-literal=DB_PORT=5432 \
#     --from-literal=DB_SSLMODE=disable \
#     --from-literal=JWT_SECRET=<long-random-string>
secret:
  name: auth-service-secret

env:
  PORT: "8081"

namespace: shipyard
