# Default values for auth-service.

replicaCount: 1

image:
  # IMPORTANT: must match the GHCR path your CI pushes to.
  # Repository names must be lowercase (otherwise you can hit InvalidImageName in Kubernetes).
  repository: ghcr.io/skyshineth/shipyard-auth-service
  pullPolicy: IfNotPresent
  # Overwritten by GitHub Actions CI on each push
  tag: "sha-f1c5ecc"

imagePullSecrets: []
# Example:
# imagePullSecrets:
#   - name: ghcr-pull

serviceAccount:
  create: true
  # If empty and create=true, defaults to release name.
  name: ""

# Prevent automatically mounting a Kubernetes API token into the pod.
automountServiceAccountToken: false

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 10001
  runAsGroup: 10001
  fsGroup: 10001
  seccompProfile:
    type: RuntimeDefault

containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

service:
  type: ClusterIP
  port: 8081

ingress:
  enabled: false
  className: ""
  annotations: {}
  host: auth.shipyard.local
  path: /
  pathType: Prefix
  tls:
    enabled: false
    # Example:
    # secretName: auth-tls
    secretName: ""

resources:
  requests:
    cpu: "50m"
    memory: "64Mi"
  limits:
    cpu: "200m"
    memory: "128Mi"

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 80

# Database + JWT secret — create before deploying:
#   kubectl create secret generic auth-service-secret -n shipyard \
#     --from-literal=DB_HOST=postgres \
#     --from-literal=DB_USER=shipyard \
#     --from-literal=DB_PASSWORD=<your-password> \
#     --from-literal=DB_NAME=shipyard \
#     --from-literal=DB_PORT=5432 \
#     --from-literal=DB_SSLMODE=disable \
#     --from-literal=JWT_SECRET=<long-random-string>
secret:
  name: auth-service-secret

env:
  PORT: "8081"

namespace: shipyard
