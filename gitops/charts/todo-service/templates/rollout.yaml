apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: {{ include "todo-service.fullname" . }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "todo-service.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      {{- include "todo-service.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "todo-service.selectorLabels" . | nindent 8 }}
    spec:
      {{- if hasKey .Values "automountServiceAccountToken" }}
      automountServiceAccountToken: {{ .Values.automountServiceAccountToken }}
      {{- end }}
      serviceAccountName: {{ include "todo-service.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: todo-service
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- with .Values.containerSecurityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
          env:
            - name: PORT
              value: {{ .Values.env.PORT | quote }}
          envFrom:
            - secretRef:
                name: {{ .Values.secret.name }}
          # Server listens only after DB connect + migrate; without this, liveness fails first.
          startupProbe:
            httpGet:
              path: /health
              port: http
            failureThreshold: 30
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
  strategy:
    canary:
      # Weight-based canary requires enough replicas for the percentage to resolve to at least
      # one pod (e.g. replicaCount >= 5 for 20%). The portfolio default is replicaCount=1, so
      # the canary step is used here to demonstrate the promotion workflow, not weighted traffic
      # splitting. Scale replicaCount to 5+ in a real environment to get actual traffic weights.
      steps:
        - setWeight: 20
        - pause: {duration: 5m}
        - setWeight: 50
        - setWeight: 100
