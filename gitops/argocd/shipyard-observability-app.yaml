apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: shipyard-observability
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: 'https://github.com/SkyShineTH/Shipyard'
    targetRevision: main
    path: gitops/charts/shipyard-observability
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - SkipDryRunOnMissingResource=true
