apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: shipyard-frontend
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/SkyShineTH/Shipyard'
    targetRevision: main
    path: gitops/charts/frontend
    helm:
      # Default: kind / local — ClusterIP (see values.kind-local.yaml).
      # On DOKS for a public LoadBalancer, replace values.kind-local.yaml with values.doks-public.yaml.
      valueFiles:
        - values.yaml
        - values.kind-local.yaml
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: shipyard
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
