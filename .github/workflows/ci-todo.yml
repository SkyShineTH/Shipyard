name: CI - Todo Service

on:
  push:
    branches:
      - main
    paths:
      - 'services/todo-service/**'
      - 'gitops/charts/todo-service/**'
  workflow_dispatch: {}

concurrency:
  group: shipyard-todo-service-main
  cancel-in-progress: false

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Sync to latest origin/main
        run: |
          git fetch origin main
          git checkout main
          git reset --hard origin/main

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute lowercase GHCR owner
        shell: bash
        run: |
          echo "GHCR_OWNER_LC=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_ENV"

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ env.GHCR_OWNER_LC }}/shipyard-todo-service
          tags: |
            type=sha,format=short
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./services/todo-service
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update Helm Chart Image Tag
        run: |
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          sed -i "s/tag: .*/tag: \"sha-${SHORT_SHA}\"/" gitops/charts/todo-service/values.yaml

      - name: Commit and push chart tag update (with retry)
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add gitops/charts/todo-service/values.yaml
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "chore(todo-service): update image tag to ${GITHUB_SHA::7} [skip ci]"

          for i in 1 2 3 4 5; do
            git fetch origin main
            git rebase origin/main || (git rebase --abort && false)
            if git push origin HEAD:main; then
              exit 0
            fi
            echo "Push failed (attempt $i); retrying..."
            sleep $((i * 2))
          done

          echo "Push failed after retries."
          exit 1
